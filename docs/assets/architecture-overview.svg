<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Operator public stack architecture</title>
  <desc id="desc">June delegates to Operator. Operator exchanges bounded execution with ARGUS and bounded validation with ATLAS.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f7ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="june" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7cff"/>
      <stop offset="100%" stop-color="#7c68f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1600" height="520" rx="32" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="72" y="170" width="360" height="120" rx="24" fill="url(#june)" stroke="#6957da" stroke-width="4"/>
    <rect x="650" y="128" width="420" height="204" rx="26" fill="#ffffff" stroke="#7a8aa5" stroke-width="4"/>
    <rect x="1288" y="74" width="256" height="126" rx="24" fill="#ffffff" stroke="#7a8aa5" stroke-width="4"/>
    <rect x="1288" y="304" width="256" height="126" rx="24" fill="#ffffff" stroke="#7a8aa5" stroke-width="4"/>
  </g>

  <path d="M432 230 H620" stroke="#94a3b8" stroke-width="5" stroke-dasharray="14 12" fill="none" marker-end="url(#arrow)"/>
  <path d="M1070 170 C1140 170 1190 126 1262 126" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1262 168 C1188 168 1142 188 1088 188" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1070 290 C1140 290 1190 346 1262 346" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1262 388 C1188 388 1142 368 1088 368" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#111827">
    <text x="112" y="236" font-size="30" font-weight="700">June</text>
    <text x="112" y="274" font-size="23" fill="#1f2937">Private orchestrator</text>

    <text x="490" y="225" font-size="22" fill="#1f2937">delegates to</text>

    <text x="690" y="188" font-size="30" font-weight="700">
      <tspan x="690" dy="0">Operator</tspan>
      <tspan x="690" dy="36">Control Plane</tspan>
    </text>
    <text x="690" y="250" font-size="25" fill="#1f2937">
      <tspan x="690" dy="0">• State</tspan>
      <tspan x="690" dy="40">• Control logic</tspan>
      <tspan x="690" dy="40">• Project truth</tspan>
    </text>

    <text x="1320" y="126" font-size="28" font-weight="700">ARGUS</text>
    <text x="1320" y="162" font-size="22" fill="#1f2937">
      <tspan x="1320" dy="0">Bounded execution</tspan>
      <tspan x="1320" dy="32">runs</tspan>
    </text>

    <text x="1320" y="356" font-size="28" font-weight="700">ATLAS</text>
    <text x="1320" y="392" font-size="22" fill="#1f2937">
      <tspan x="1320" dy="0">Validation</tspan>
      <tspan x="1320" dy="32">Sandboxing</tspan>
    </text>
  </g>
</svg>
